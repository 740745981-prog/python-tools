<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 智能客服 — 演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f0f2f5;display:flex;justify-content:center;align-items:center;min-height:100vh}
.chat{width:400px;height:700px;background:#fff;border-radius:12px;box-shadow:0 2px 20px rgba(0,0,0,.12);display:flex;flex-direction:column;overflow:hidden}
.header{background:#1a73e8;color:#fff;padding:16px;text-align:center}
.header h2{font-size:16px;font-weight:500}
.header p{font-size:12px;opacity:.8;margin-top:4px}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{padding:10px 14px;border-radius:12px;max-width:80%;font-size:14px;line-height:1.5;word-break:break-word}
.msg.ai{background:#f0f2f5;align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:#1a73e8;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.system{background:#fff3e0;align-self:center;font-size:11px;border-radius:8px;max-width:90%}
.input-box{display:flex;padding:12px;gap:8px;border-top:1px solid #eee}
.input-box input{flex:1;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none}
.input-box button{background:#1a73e8;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:14px;white-space:nowrap}
.input-box button:hover{background:#1557b0}
.input-box button:disabled{opacity:.5}
.typing{color:#999;font-size:12px;padding:0 14px}
</style>
</head>
<body>

<div class="chat">
  <div class="header">
    <h2>🏨 阳光假日酒店 · AI 客服</h2>
    <p>演示版 — DeepSeek 驱动</p>
  </div>

  <div class="messages" id="messages">
    <div class="msg ai">👋 您好！我是阳光假日酒店的AI客服。<br>可以问我：房型价格、入住时间、退房政策、周边交通等。</div>
  </div>

  <div class="input-box">
    <input type="text" id="input" placeholder="问点什么吧..." onkeydown="if(event.key==='Enter')send()">
    <button id="btn" onclick="send()">发送</button>
  </div>
</div>

<script>
const API_KEY = 'sk-c28527a094fb4f9f8d35a6b7268725af';
const API_URL = 'https://api.deepseek.com/chat/completions';

const SYSTEM_PROMPT = `你是阳光假日酒店的AI前台客服。酒店位于郑州市巩义市。
信息:
- 标准间: 198元/晚, 大床房: 258元/晚, 套房: 398元/晚
- 入住时间: 14:00, 退房时间: 12:00
- 提供免费WiFi、免费停车、早餐
- 距离巩义火车站2公里，打车约10分钟
- 周边有巩义石窟、康百万庄园

回复规则:
- 热情但简洁，每次回复不超过3句话
- 如果客人问的问题你不知道，说"我帮您转接人工前台"`;

let history = [{"role":"system","content":SYSTEM_PROMPT}];

function addMsg(role, text){
  let div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 99999;
}

async function send(){
  let input = document.getElementById('input');
  let btn = document.getElementById('btn');
  let text = input.value.trim();
  if(!text) return;

  addMsg('user', text);
  input.value = '';
  btn.disabled = true;

  history.push({"role":"user","content":text});

  try{
    let resp = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+API_KEY},
      body:JSON.stringify({model:'deepseek-chat',messages:history,max_tokens:300})
    });
    let data = await resp.json();
    let reply = data.choices[0].message.content;
    addMsg('ai', reply);
    history.push({"role":"assistant","content":reply});
  }catch(e){
    addMsg('system','网络错误，请检查API Key是否正确配置');
  }
  btn.disabled = false;
}
</script>

</body>
</html>
